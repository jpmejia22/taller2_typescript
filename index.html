<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial 1-TV series</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <style>
    .card {
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
    }
    .card-img-top {
        max-height: 200px;
        object-fit: cover;
        width: 100%;
    }
    .table-striped tbody tr:hover {
        background-color: #e9ecef;
        cursor: pointer;
    }
    .bg-info {
        background-color: #17a2b8 !important;
    }
</style>
</head>
<body>
    <div class="container-fluid bg-info">
        <div class="row align-items-center">
            <div class="col-auto">
                <img src="./tv-1625220_1280.webp" alt="TV Series Icon" style="width: 60px; height: auto;">
            </div>
            <div class="col">
                <h2>TV Series</h2>
            </div>
        </div>
    </div>
    <div class="container text-left">
        <div class="row">
            <div class="col-6">
            <table class="table table-striped text-left">
                <thead>
                    <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Channel</th>
                    <th>Seasons</th>
                    </tr>
                </thead>
            <tbody id="Series"></tbody>
            </table>
            </div>
            <div class="col-md-5">
                <div class="card" id="serie-card" style="width: 100%;">
                    <img class="card-img-top" id="card-image" alt="Serie image">
                    <div class="card-body">
                        <h5 class="card-title" id="card-title">Detalle de la serie</h5>
                        <p class="card-text" id="card-description">Haz clic en cualquier serie para ver su información.</p>
                        <a href="#" id="card-link" class="btn btn-primary" target="_blank">Ir a la pagina de la serie</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
            <p>Total Créditos: <p id="media-seasons" class="text-left"></p></p>
            </div> 
        </div>
    </div>
    <script type="module" src="./serie.js" ></script>
    <script type="module" src="./series.js" ></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
